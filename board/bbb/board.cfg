# Board: BeagleBone Black
# Copied to ~/.config/bbb_buildroot_cfg by: make bbb
# Edit freely — sourced as shell variables by all scripts.

BOARD_NAME=bbb
BOARD=192.168.0.101
BOARD_PASS=root
DTB=am335x-boneblack.dtb
TFTP_DIR=/tftpboot
OUTPUT_DIR=output

# Network boot (TFTP + NFS)
# HOST_IP is auto-detected from the route to BOARD. Override here if needed.
#HOST_IP=192.168.0.100
NFS_DIR=/src/bbb-buildroot/output/target
