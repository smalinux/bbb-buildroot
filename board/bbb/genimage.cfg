image boot.vfat {
	vfat {
		files = {
			"MLO",
			"u-boot.img",
			"boot.scr"
		}
	}

	size = 16M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
		offset = 4M
	}

	partition rootfs-a {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 512M
	}

	partition rootfs-b {
		partition-type = 0x83
		image = "rootfs.ext4"
		size = 512M
	}

	partition data {
		partition-type = 0x83
		image = "data.ext4"
		size = 128M
	}
}

image data.ext4 {
	ext4 {
		label = "data"
	}

	size = 128M
}
