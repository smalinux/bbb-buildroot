# dnsmasq config for BBB network boot (TFTP + proxy DHCP)
#
# Installed to /etc/dnsmasq.d/bbb-netboot.conf by `make bbb`.
#
# What this does:
#   - TFTP server: serves files from TFTP_DIR (symlinks to output/images/)
#   - Proxy DHCP: tells U-Boot where the TFTP server is (next-server)
#     without replacing the router's DHCP. The router still assigns IPs.
#
# The proxy DHCP adds "next-server" (option 66) to DHCP replies so
# U-Boot's `dhcp` command automatically uses our host as the TFTP
# server instead of the router.

# Disable DNS — we only want TFTP + proxy DHCP
port=0

# --- TFTP server ---
enable-tftp
tftp-root=TFTP_DIR_PLACEHOLDER
tftp-no-fail
tftp-no-blocksize

# --- Proxy DHCP ---
# dhcp-range: enable proxy DHCP on the local subnet.
# The third argument "proxy" means: don't assign IPs, just add boot
# options (next-server, filename) to the router's DHCP responses.
dhcp-range=192.168.0.0,proxy

# Tell U-Boot where to TFTP from (next-server = this host)
dhcp-boot=pxelinux.0,HOST_IP_PLACEHOLDER
