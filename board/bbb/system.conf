[system]
compatible=beaglebone-black
bootloader=uboot
mountprefix=/mnt/rauc
data-directory=/data/rauc

[keyring]
path=/etc/rauc/keyring.pem

[streaming]
send-headers=boot-id;system-version

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=ext4
bootname=B
