# watchdog.conf — hardware watchdog daemon configuration for BBB
#
# The AM335x has a built-in OMAP watchdog timer (/dev/watchdog0).
# The watchdog daemon pets the device at regular intervals. If the
# daemon stops (system hang, OOM, init crash), the hardware forces
# a reboot after the timeout expires.

# Device to pet
watchdog-device = /dev/watchdog0

# Pet the watchdog every 10 seconds.  The OMAP WDT hardware timeout
# is ~60 s by default; petting every 10 s gives plenty of margin.
interval = 10

# Reboot if any monitored test fails (rather than just logging).
# This is the whole point of the watchdog for unattended boards.
realtime = yes
priority = 1

# --- System health checks ---
# Reboot if load average exceeds these thresholds for 1/5/15 min.
# A Cortex-A8 single-core with load >10 is effectively hung.
max-load-1 = 24
max-load-5 = 18

# Reboot if available memory drops below 4 MB (severe OOM).
min-memory = 4096
