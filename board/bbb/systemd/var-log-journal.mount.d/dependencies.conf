# Prevent [FAILED] unmount during shutdown.
#
# data-persist.sh bind-mounts /data/journal over /var/log/journal at boot.
# systemd auto-discovers this mount and generates a var-log-journal.mount
# unit for it. During shutdown, systemd tries to unmount it — but journald
# may still be writing to it, causing the unmount to fail.
#
# This drop-in adds an ordering dependency: don't unmount /var/log/journal
# until after journald has fully stopped.
[Unit]
After=systemd-journald.service
