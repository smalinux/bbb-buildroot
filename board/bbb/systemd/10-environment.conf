[Manager]
# Set HISTFILE/ENV globally for all services. This propagates through
# agetty → login → shell and dropbear → shell without needing to modify
# their ExecStart or use login -p (which breaks session tracking/reboot).
DefaultEnvironment=ENV=/etc/profile.d/shell.sh HISTFILE=/root/.ash_history HISTSIZE=1000

# Fast shutdown — don't wait 90s (default) for stuck services
DefaultTimeoutStopSec=10s
